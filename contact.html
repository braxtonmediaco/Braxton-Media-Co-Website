                            <label class="block text-sm font-bold text-slate-300 mb-2 group-focus-within:text-brand-blue transition-colors">Your Message</label>
                            <textarea name="message" required rows="5" class="w-full bg-brand-gray/10 border border-brand-gray/30 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-brand-blue focus:bg-brand-gray/20 transition-all font-medium" placeholder="Tell us about your project..."></textarea>
